workflows:
  # ---------------------------------------------------------------
  # TEMPORARY workflow — use this while waiting on Apple Developer
  # Program approval. Builds for the iOS Simulator, which needs no
  # signing / no App Store Connect integration at all. Confirms the
  # whole pipeline (npm -> Vite -> Capacitor -> CocoaPods -> Xcode)
  # works end to end. Cannot install on a physical phone.
  # ---------------------------------------------------------------
  ios-canon-quest-simulator:
    name: Canon Quest iOS (Simulator build, no signing)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Build for simulator (no signing needed)
        script: |
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build/sim
    artifacts:
      - build/sim/Build/Products/**/*.app
      - /tmp/xcodebuild_logs/*.log

  # ---------------------------------------------------------------
  # REAL workflow — switch to this once your Apple Developer account
  # is approved AND you've created an "app_store_connect" integration
  # in Codemagic (Team settings -> Integrations -> App Store Connect).
  # Replace the name below ("codemagic") with whatever you named that
  # integration. Then either rename this workflow to
  # "ios-canon-quest-simulator" (delete the block above) or just start
  # a build on this workflow specifically from the Codemagic dashboard.
  # ---------------------------------------------------------------
  ios-canon-quest-release:
    name: Canon Quest iOS (TestFlight release)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Personal
    environment:
      groups:
        - ios_signing   # create this group in Codemagic UI (App Store Connect API key)
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.rachelle.canonquest" \
            --type IOS_APP_STORE \
            --create
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Archive app
        script: |
          set -x
          mkdir -p build/ios/xcarchive
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/ios/xcarchive/App.xcarchive \
            -destination "generic/platform=iOS" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_STYLE=Manual \
            2>&1 | tee /tmp/xcodebuild_archive_full.log
          echo "----- LAST 100 LINES -----"
          tail -100 /tmp/xcodebuild_archive_full.log
      - name: Export ipa
        script: |
          set -x
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "$HOME/export_options.plist" \
            2>&1 | tee /tmp/xcodebuild_export_full.log
          echo "----- LAST 100 LINES -----"
          tail -100 /tmp/xcodebuild_export_full.log
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/xcodebuild_archive_full.log
      - /tmp/xcodebuild_export_full.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
